<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Technoboy</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@300;400;500&display=swap');

*{box-sizing:border-box;margin:0;padding:0;}

body{
background:#0a0a0a;
color:#f0ede8;
font-family:'DM Sans',sans-serif;
}

.page{
max-width:680px;
margin:auto;
padding:20px;
}

/* NAV */
nav{
display:flex;
justify-content:space-between;
align-items:center;
flex-wrap:wrap;
padding:20px;
}

.nav-links{
display:flex;
gap:20px;
flex-wrap:wrap;
}

/* HERO */
.hero{
padding:40px 0;
}

.hero h1{
font-family:'DM Serif Display',serif;
font-size:clamp(28px,8vw,56px);
line-height:1.1;
margin-bottom:15px;
}

.hero p{
color:#888;
margin-bottom:20px;
}

/* BUTTONS */
.cta{
display:flex;
gap:10px;
flex-wrap:wrap;
}

.cta a{
padding:12px 16px;
border:1px solid #333;
text-decoration:none;
color:#fff;
}

/* SERVICES */
.services{
margin-top:40px;
display:grid;
grid-template-columns:1fr 1fr;
gap:10px;
}

.card{
background:#111;
padding:15px;
}

/* MOBILE FIXES */
@media(max-width:768px){

nav{
flex-direction:column;
align-items:flex-start;
gap:10px;
}

.services{
grid-template-columns:1fr;
}

.cta a{
width:100%;
text-align:center;
}

.hero{
padding:30px 0;
}

}

</style>
</head>

<body>

<nav>
<div>Technoboy</div>
<div class="nav-links">
<a href="#">Servicios</a>
<a href="#">Contacto</a>
</div>
</nav>

<div class="page">

<section class="hero">
<p>⚡ Servicios tecnológicos</p>
<h1>Soluciones tech<br><em>a medida.</em></h1>
<p>Desarrollo de apps, soporte técnico, instalación de sistemas y mucho más.</p>

<div class="cta">
<a href="https://wa.me/5491169306542">WhatsApp</a>
<a href="https://github.com/technoboy240/service">GitHub</a>
</div>
</section>

<section class="services">
<div class="card">📱 Desarrollo de apps</div>
<div class="card">🪟 Instalación de Windows</div>
<div class="card">🧹 Limpieza</div>
<div class="card">⚙️ Administración IT</div>
<div class="card">🤖 IA</div>
</section>

</div>

</body>
</html>
